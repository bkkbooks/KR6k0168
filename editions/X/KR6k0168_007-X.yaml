body:
  text: 二十三僧殘篇二初標篇名二故下列戒相十三初漏失戒二初標名二此下釋相三初安布二多下制意三具下犯相二初明犯二初列緣二五下隨釋二初睡眠結犯二律下夢中開意二不犯二初正明不犯二初本律二十下他部二伽下明為他犯二摩觸戒至十三拒僧諫戒二摩觸戒二初標名二多下釋相二初制意二具下正釋二初明犯二初列緣二初下隨釋二初引本律通釋三緣三初第一緣二有下第三緣三身下第四緣四初身相二言下相觸三若下二形四律下男子二善下引他部別釋第三四初覺不覺境二僧下非畜女三十下黃門四善下諸觸二不犯三初列相二僧下引決三初僧祇二十誦三僧祇三十下指廣三麤語戒二初標名二七下釋相二初明犯二初列緣二律下牒釋二初釋約緣二麤下釋第四二初約染心向女二初通明諸相二如下別證善語二初明相解二若下不相解二此下約彼此互向二不犯四歎身戒二初標名二論下釋相二初明犯二初列犯緣二律下釋第四二不犯五媒人戒二初標名二六下釋相二初明犯二初列緣二律下隨釋二初釋第六二十下釋第三六初非女二此下非法三僧下畜類四五下倩使五十下媒相六僧下勸還二不犯二初開和合二律下開持書六無主房戒二初標名二具下釋相二初制意二六下正釋二初明犯二初列緣二薩下牒釋五初釋第六二律下釋第四四初明乞法二善下明磔量二初通示長廣二然下校勘尺寸三初總引諸異二今下約義去取二初判定二後下斥濫三初斥世妄用二即下舉事證成三余下斥世闕略三今下正示數量三若下釋第一四難下重釋第四三初妨難二初難處二妨處二明下處分三初須乞分齊二僧下指授是非三薩下房處通局三善下過量二初過滅二初正明二問答二四下教作五妨下重釋第六二不犯七有主房戒二初標名二制下辨相二初指制意二成下釋犯相二初明犯二初列緣二此下牒釋二初釋第二二律下釋第六二開下不犯八無根謗戒二初標名二多下釋相三初明制意二問下辨單重三具下釋犯相二初犯二初列犯緣二善下釋第五二不犯九假根謗戒三初標名二此下辨異三犯下釋相三初指犯緣二律下明異分三餘下指略十破僧戒二初標名二此下釋相二初總示諸諫二初明五戒略意二至下示汙家廣意二就下正釋今戒二初犯二初列犯緣二違下示罪相二不犯十一助破僧戒二初標名二具下列緣十二汙家擯謗戒二初標名二具下釋相二初犯二初列犯緣二四下釋第一三初四分二初汙家二惡行二僧祇三多論二初通標二種二又下別釋汙家五初廢亂正業二由下破平等心三又下倒亂佛法四又下營福無益五若下有緣開與二不犯十三拒僧諫戒二初標名二具下釋相二初犯二初列緣二此下隨釋二初明違諫之由二多下引論通會二初問二答二不犯三二不定二初標指二多下釋相二初通明制意二初下別釋二戒二初屏處不定二初標名二四下釋相三初列緣二四下牒釋二初本宗通釋二僧下他部別釋二初釋二三二善下釋第一三如下結示二後下露處不定四三十捨墮二初標指二初下列釋三十初長衣戒二初標名二多下釋相二初制意二具下辨相二初明犯二初總標二一下列釋二初別示第一緣三初標示二四下簡辨三初定量二十下揀濫三多下辨異二初引示二問答三已下結顯二二下總列餘五緣二初列示二多下牒釋三初釋第三三初示犯相二初明分齊二善下明開合二問下明相染二初明應量染二若下不應量染二僧下釋第四四初僧祇二四分三伽論四了論三四下釋第二二初八門不染二律下貿易不染三初引律示犯二昔下憑論斥古三上下準義釋通二不犯五初遣施二若下異想三律下緣差二初昔下憑論斥古二上下準義釋通四律下重物五律下阻礙二離衣戒至三十迴僧物戒二離衣戒三初標名二具下釋指二初明犯二初列緣二三下牒釋四初第一二初對衣辨犯二又下約根顯異二第二三第三二初總示二初下別釋四初染礙二隔礙三情礙四界礙二初通明二界二若下別釋自然四初指略標示二四下引教廣釋二初本宗十一種二初總舉二一下別釋九初二合明僧村二初明界相二此下顯同別二初列古指非二今下示今正解三樹界三初小相二十下大相三初十誦二善見三僧祇三明下上下四揚界五六合明車船七舍界二初正明舍界二對下因解聚落三初標示二四下正釋三初聚落二初通簡名體二聚下別明分齊二初對家聚明同別二初準律論定名二言下引多論顯相三初聚界二家界三族界二僧下約多聚明同別二十下別舍三多下重舍三上下結示八堂界九庫界十倉界十一蘭若二次下他部四種二初標示二十下別釋四十二道行界二初明界量二善下示別緣二初使人持行緣二明下出入遇難緣十三洲界十四水界十五并界三此下勢分有無二初本宗通有二諸下諸部不立二初標示二善下正明二初引善見明分齊二準僧祗校本宗二初先引諸開二若下準明緩急四上下強弱相攝二初明各異二而下示相攝三初對僧村明相攝二若下明勢分相侵三若下論諸界相攝四第五三初總標二一下別釋三就下料簡三初法有無二得下罪有無三五下失不失二不犯二初列諸緣二初明情隔兩礙二初列示兩礙二若下勤慢兩斷二若下略示染礙二問忘誤三上下結指三月望衣戒二初標名二此下釋相二初明制限二六下釋犯相二初明犯二初列緣二此下隨釋三初列三位二僧下示急作三若下明相染二餘下不犯四取非親尼衣戒二初標名二具下釋相二初明犯二初總標二一下列釋五初第一二第二三第三四第四五第五二初標緣二伽下正釋四初寄用無犯二僧下