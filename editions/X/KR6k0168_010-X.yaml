body:
  text: 餘杭郡沙門釋元照錄第三下卷十四篇明共行三初標卷題二初題目二撰號二列篇目三隨篇釋十四初二衣總別篇第十七二初篇目二本文二初敘意分章二何下隨章解釋二初總分制聽二今下依門而解二初制開二初標二前下釋三初三衣三初標分二初下隨釋二初衣法二初分章二言下隨釋四初制意等三三初制意二初標二薩下釋五初異外俗意二雜下表內行意三華下捨諸惡意四薩下制須三意五僧下同聖儀意二釋名二初標二增下釋二初總名二四下別名二初列名標示二而下約義正翻二初標舉二慧下正明四初引經文以明二義下示義翻多種三若下就條相以辨四若下約通相以論三明功用二初標二大下釋三初大悲經二悲華經三僧祗律二作之方法二初總標二一下別釋八初求財如法二財體如法二初標章二必下正釋三初示如非二律下引證三僧下引勸三色如法二初標二四下釋二初引文三初通示壞色二十下廣辨色相三初十誦二婆論三僧祇三遺下引文斥濫二準下結斷四定量是非二初標二四下釋三初明四分兼含二雖下引諸文示準三五下明五分唯通五條數多少二初標二所下釋二初略指隻數二四下正示多少三初約諸文示數二四下斥時濫行三聖下引聖為準六堤數長短二初標二四下釋二初示長短數二初示本部不了二婆下引多論明示二所下明割截意七重數多少二初標二四下釋二初新故多少三初純新故作二薩下新故參作三律下拾糞掃作二薩下摘分留置八作衣方法二初標二四下釋八初三品開制二僧下作時緩急三薩下指作非長四四下改轉造作三初四分二五分三僧祇五十下鉤粈六十下縫刺七十下安揲八十下揲棄三加受持法二初標分二初下隨釋二初對首法二初僧尼同法三初用法是非二若下總分品數三今下正加受法二初受法三初標示二應下正加三初下衣二初標舉二加下加法二初加正衣法二加從衣法二初上中二種從二若下總示縵衣從二中衣三上衣三上下結歎二初引文顯數二薩下斥非伸歎二捨法二若下尼眾別法二初正加法二僧下顯部別二心念法四出雜料簡二初標舉二初下隨釋三初受捨是非二初標二十下釋五初借衣犯懺二五下不捨重受三善下損破失不四善下遇緣失不五薩下不受轉淨二補治浣染二初標二十下釋四初淨法和合二善下補浣之法三初善見二五分三四分三四下所須之具四十下補治之意三受用擎舉二初標二十下釋十二初敬護二十下隨身三明下入聚二初入聚開制二僧下脫著法式四五下枕臥五三下重著六五下反倒七舍下通肩披八三下難開不著九決下有緣不禮十三下披著法式十一五下互著得不十二五下引示功能二衣界二坐具三漉袋二聽門二四藥受淨篇至諸部別行篇二衣界二初牒章簡示二今下立法加結二初揀須否二諸下明解結二初結法二初立法二初標古立今二此下結告顯證二加結二解法二坐具二初牒名二四下正釋三初製作法四初引制意二初顯意示量二諸下定搩大小二十下造作三十下離宿四僧下僧量四初引增文二四下示非法三如下明正法四薩下明揀濫二僧下受捨法三僧下持用法三漉袋二初牒名二物下正釋五初制意二薩下用法三四下製樣四此下誡約五今下遮妨二聽門二初牒章分門二初下依門別釋四初百一諸長二初總分二初下隨釋二初百一供身令受持之二初示名揀體二僧下廣列物數二初開許之物二十下受法須不二初示受法二善下簡須不二長物及餘令說淨畜二初分章二初下隨釋二初明長相三初服飾開制二初約時顯相二僧下廣辨眾物三初僧祇支二涅槃僧三初示法制式二十下造作著用三十下毀破暫開三今下餘衣三初時用非法二十下制斷俗外三中下開畜之物二初明開意二四下列眾物三初著用僧物二四下受畜貴物三四下聽畜諸物二初開畜眾物二四下簡辨得不二四下邊方曲開三律下皮革靴履二初總示諸物二毗下別明靴履五初開處二五下製造三毗下修敬四五下作淨五四下雜相二開說淨二初牒章分科二初下隨科別釋六初制說意三初引論明意二母下不說無開三地下大小同制二二施主差別二初牒章總示二前下引文別簡二初揀衣藥鉢施主四初明所對二五下揀可不三十下辨多少四薩下制簡德二錢下揀錢寶等施主三開說進否二初標二先下釋二初明開請須不二初明須請二次下似不須請二請下列示請法二初請道眾法二初展轉淨主二真實淨主二寶下請俗人法四說之法用二初標二五下釋二初衣物淨法二初心念法二對首法三初列淨法二初總標二至下別示二初展轉淨二善下真實淨二二下明成就三五下引漫標二錢寶淨法五辨施主存亡二初標二僧下釋二初示存亡二然下明簡德六明失法不同二初標二僧下釋四初淨主死亡三初僧祇二多論三十誦二僧下迷忘重說三薩下貸易後還四毗下二淨和合二糞掃衣三檀越施四亡人物二糞掃衣二初標二制下釋二初明制著意二初釋名顯意二十下引示利益二言下明衣物體三初總列諸物二初正列二比下斥非二十下別示死人衣三四下得畜之意三檀越施二初標舉二言下隨釋二初總釋名義二今下分位別釋二初就一部自論二初總舉二就下正釋二初二種時施二初標二初下釋二初時現前二初出體示法二四下引文顯相二時僧得二初出體示法二律下引雜相三初明作法二僧下與下眾三五下給破夏二二種非時施二初標二初下釋二初非時現前二初示體顯法二十下例通下眾二非時僧得二初出體示法二律下引制緣二明二部互正二初標指二四下正明二初二部互二五下當部互四亡人物二初標二既下釋二初敘意開章三初明兩機相濟二然下示昔斷多途三今下顯今宗所立二初下隨章別釋十初制入僧二初標二所下釋二初不入佛法二亦下不入俗人二對亡者分法不同二初標舉二一下別釋十初糞掃取二入當時現前三入同見僧四入功能僧五入二部僧六入面所向僧七入和尚八入所親白衣九入隨所在處十上下入羯磨分三同活共財二初標二若下釋四初不共同活二若下決心同活三若下各分同活四若下不同妄取四囑授是非二初標列二初下隨釋四初囑授善惡二初總標二一下別釋四如文二人物差別二初標二一下釋四如文三重單囑授二初標二僧下釋二初正明二準下斷犯四成不之相二初標二凡下釋二初約義正明二初正顯成不之相二若下約未死準同二故下引文以示五負債進不二初標二先下釋二初先以義求二初總約佛法別人以明二若下別據常住以辨二十下後引文斷四初十誦明諸相二初引文顯相二此下決通後句二母論明遣索三五百問明物主索取四僧祗明量彼可信六定物輕重七具德賞勞八分物時節九正加分法十雜明受物六定物輕重二初標二然下釋三初明約教處判二今下述意總標三一下依位別釋三初唯取四分不取外宗三初敘計二若下決判三此下結示二四分先準諸部類通二初迷計二初下決判二初略分三位二初總標二一下別釋三初佛所制畜二制不聽物三佛開聽畜二初敘意總標二一下別列三位三初性重二性輕三從用輕重二但下廣分七種四初敘意總舉二十下引示儀式三第下引文正判七初絲麻毛緜二初標二四下釋二初四分六初床褥二氍毺三被下被四薄下氈五氍下文綺六綾下貴衣二僧下諸部七初僧祇二五分三五大色衣四絲下絲縷五盛下囊袋六一下俗服七雜下雜色等物二瓦石鐵木竹等二初標二四下釋二初四分三初盆器作具二剃刀三錢寶二十下諸部八初十誦律二僧祇律三善見論四楞伽經五若下送終物六櫃下櫃簏等物七四下諸器物八供下諸供具三田園房舍等二初標二四下釋二初四分二初田園房舍二若下莊嚴諸物二十下他部四皮革二初標二四下釋二初四分二十下他部四初囊帶二平下靴履三毗下經書四盛下澡豆五畜生二初標二毗下釋六人民奴婢二初標二四下釋二初四分二毗下他部七四藥二初標二無下釋二初諸藥二十下請食前後四餘下指略結成三通用律藏廢立正文七具德賞勞二初牒章二四下正釋三初簡德二初示二種五德二初總標二初下別釋二初顯德二次下明行二有下明賞物可不二次下與物二初引文示物二義下準義量德三簡下簡人二初明七眾得不二十下明外界合賞八分物時節二初標二五下釋二初死已即分二十下屍去後分九正加分法二初標分二初下隨釋二初集錢財衣物二加法分之二初列示三法二初總標二初下別示三初羯磨二初總分二今下別釋二初五人已上法二初標示二前下正釋二初處判賞勞四初集物召眾二僧下瞻病捨衣三眾下處判諸物四但下加法賞勞三初明不須問德二若下告勅問和三大下正加賞法二次下差分輕物二初標二律下釋二初明差人二初準用口差二持下制知合賞二今下明作法二初分付法二初明儀式二文下作羯磨二作下分物法三初正分二初先分大僧四初示分法二五下明衣少三若下勸依行四若下明留分二次下次分餘眾二如下結告三律下斥非二若下四人法二對首三心念二問顯非衣十雜明受物二初標章二若下正釋二初正明雜相三初在莊寺法二四下在白衣家法三初先至二準下互至三若下取法三僧下同界盡集二問答釋疑二初問出界分物成否二問將出先見得成
