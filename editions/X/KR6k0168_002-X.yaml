body:
  text: 餘杭郡沙門釋元照錄鈔文分為三初敘緣發起二初題號二初標題二撰號二序文三初通敘撰述緣起二初略歎戒德以標宗二自下廣敘弘傳以生起二初正像弘傳二逮下像季弘傳二初敘昔澆訛二初通明兩土二所下別示此方二初總明傳教之失三初標其自任二欲下列其所失三豈下結示難易二然下別彰講解之過二初斥學解三初通敘局執二致下列示乖諍三自下結歎難能二常下嗟撰集二初別斥二初疏鈔乖宗二時下義集繁闕二並下總斥二余下明今述作三初通敘興懷二包下別示文體三初引用取舍二或下述作體勢三并下統會成宗三然下勒卷分篇二初約文勒卷二初能詮三卷三初遮異說二今下示今意三若下指所闕二然下示所詮三位二但下以類分篇二初敘意二標下列名二至下統括諸篇大綱三初敘意生起二第下分門別示十第一門三初標章二夫下正明二初通明教興三初大慈愍物意二初據論顯意二故下引律證成二對異外道意二初敘本制意二觀下據律證成三懸被異宗意二初總約群宗顯意二且下略引二部證成二初薩婆多部二今下曇無德部二上下就當宗以辨二初指前標後二夫下約律正明二初敘廣總標二一下位分別釋二初正明別意五初遮性往分二初總示通局二然下別明緩急二初正明三初性戒二遮戒二故下引證二開制往徵三初標舉二故下引分示二初未來教二如下在世教三然下明互融三報有強弱四機悟不同五事法相對二且下結顯總意二初正明二故下引證三下下結指第二門第三門第四門第五門第六門第七門第八門第九門第十門三此下總結指廣三夫下總示所詮所相二正列諸篇三批記時處第二門二初標舉二輕下正明二初敘教難裁二雖下尋文可究三初敘意標舉二一下約文別列三凡下總前結示第三門二初標舉二自下正明二初敘古三初通示乖競二良下推究所由三故下勸學離過二今下顯今二初正判今宗二猶下更示分齊二初敘妄判二今下示通準第四門二初標舉二統下正明二初敘律分宗三初本同計異二所下隨計分宗三故下別異之相二今下明今取用二初正取諸部四初立宗標示二故下引論為準三然下正明取意三初敘意標示二謂下舉例取文三又下取用之法三初取相關三初明取舍二若下示合法三若下斥偏局二若下明用他事三或下示兩存四然下檢閱無濫二又下兼用六師二初列示諸見三初總標二一下列示三此下通結二此下顯今所宗第五門二初標舉二夫下正明二初通敘立教之源二然下別明律藏之缺二初考昔遺缺二所下顯今決通三初敘意通標二若下別示諸例三然下評量可否二初明不能二初正明二故下引證二然下示堪能二初正時二故下引證二初十誦二了論第六門二初標舉二詮下正明二初標敘能詮二然下正辨所詮二初通持犯二若下別持犯第七門二初標舉二顯下正明二初出教體二初敘意總標二一下列示二教二初化教二行教二然下示所判三初示宗二謂下正判二初業分內外二然下罪異單重三文下徵意第八門二初標舉二然下正明二初正明通塞二初明通二餘下明塞二此下結意指廣第九門二初標舉二二下正明二初二眾沙彌二初明同法二自下辨異法二式叉摩那二初示同行二必下指別行第十門二初標分二初下列示三初引用正經二初明三藏正教三初總標二僧下別釋二初小乘律論二大小乘經論三並下結略二次下示諸師異執三列標舉二法下列示三已下結指二次下世中偽經三初標章二諸下列示三如下結斥三後下鈔興本意二初標舉二夫下正明三初標示名義二余下謙己伸懷三雖下正示本意五初敘刪簡二及下指餘義三而下明不具四庶下示所為五猶下遮妄增三此下總結指廣三夫下總示所詮行相三初約行判文三初總示二若下別對三此下雙結二然下示難離過三今下結略伸勸二正列諸篇三初上卷十二篇明眾行三初標卷題二列篇明三隨篇釋二初標宗一篇總標宗體以勸修學二初篇目二本文二初先出宗體二初敘宗勸學二初約喻歎教二故下就人勸持三初明順奉以顯德二而下敘不學以彰非二初明愚教二是下彰過失三故下舉興替以激勸二今下正明宗體二初示意二夫下顯相二初先敘領受二初正示得失二是下結誥用心二何下徵釋相狀二初標列二言下隨釋四初戒法三初示相二雖下彰名三但下明志二戒體二初標指彼此二謂下正示心相三戒行四戒相二此下引文顯德二初結前生起二就下廣引誠證二初標章指廣二初下依位引明二初順戒住住二初分科二初下隨釋二初約化教二初總分二一下別釋四初小乘經二初標二如下釋三初人法相似義二然下萬行所歸義三又下生成住持義二小乘論二初標二如下釋三初成實論二解脫道論三毗婆沙論三初總列二尸下別解三尊下覆釋三大乘經二初標二華下釋六初華嚴經二大集經三薩遮尼犍經四月燈三昧經五涅槃經六華嚴經四大乘論二初標二智下釋三初智度論二地持論三十住婆沙論二就制門二初總標二先下別釋二初律本二初標示二僧下正引三初僧祇律二四分律三十誦律二律論二初標示二正引二初明功能四初明了論二薩婆多論三善見論四五百問論二薩下顯秘勝二違戒滅法二初牒章總示二十下廣引諸文四初破戒滅法二初十誦律二初五種滅法二又下五種怖畏二四分律二十下廢學訶責二初十誦律二雜含經三中下現未衰惡五初中今經二涅槃經三摩耶經四智度論二初引前破戒文二引後遮疑問二初正引問答二今下斥非顯意五四分律四十下不學滅法二下十一篇別約四緣以明眾行二中卷四篇明自行三