body:
  text: 二受戒篇第八分二初篇目二本文二初受戒本篇二初敘來意四初標歎功深二既下敘緣生起三而下斥世非法三初通斥無知二或下別列非相三如下結示兩損四故下引證勸依二初下分章釋二初標章二初下隨釋二初具緣成受三初列示五緣二初標舉二一下列釋五初能受五法二初總標二一下別列五初是人道二諸根具足三身器清淨四出家相具五得少分法二所對六法二初總標二一下別列六初結界成就三初敘立所以二比下斥古妄行三中下引事勸慎二有能秉僧三數滿如法四界內盡集五白四教法六資緣具足三發心乞受四心境相應五事成究竟二今下引論通證三必下誡令檢勘二正加教法三初標章二若下點示三緣下隨釋二初緣起方便二初總標二一下別釋十初得法以不二請師法二初標二初下釋二初正明請法三初請和尚法二初請法五初制請意二善下引制緣三四下列請儀四當下出請詞五僧下明答法二問下釋疑二請二師法二初標示所出二應下正明請法二初請羯磨師二請教授師三請七證法二初約義立請二世下斥世不行二更下料簡成否二初標二四下正釋二初簡持破三初弟子知師犯二若下十師互知犯三若下決前犯相二和下簡德臘二初正示階漸二統下通簡宿德三教發戒緣四安置立處五差威儀師六出衆問緣七單白入衆八正明乞戒九戒師白和十正明對問二正明體用二捨戒六念法附三教發戒緣二初標二薩下釋三初敘意分章二初下隨科別釋二初緣境三初示境二初正明二故下引證二薩下顯德二初歎德二是下勸受三如下結勸二次下心量二初標二應下釋二初勸發上品二毗下列示三品二初引文明下品二餘下就義明二品二初雙標二云下引別釋二初明中品二云下明上品二初正明二如下結勸三問下釋疑三如下結告先示四安置立處二初引文據二初明立處二四下問難處二若下立儀式五差威儀師二初標二四下釋二初引緣二五下作法四初召問二應下和僧三戒師作白四應下教授出衆六出衆問緣二初標二所下釋三初示出意二但下辨遮難二初總敘四初廣辨之意二若下受前預教三若下安布次第四又下能問通解二一下別釋二初明遮難二初明難九初邊罪二犯尼三初標名二四下正釋二初明壞尼三初定淨穢二十下明餘犯三善下示雜相二初引論二必下義決二問下壞比丘三皆下總示三賊心二初標二律下釋二初正示名體二初引本律通明二初引示二四下決通二善下引他部細辨二四下料簡盜法三初簡聞解二摩下約年不滿三十下明捨尼戒四破內外道三初標名二謂下正釋二初示二破名相二律下明初來聽度二初引緣示制二問下問通與戒三此下結略五黃門二初標二一下釋二初通列五種二世下別簡第二二初明分截二四下定都截六三殺七二逆八非畜二初列示二相二初非人二畜生二此下總示轉問九二形二上下辨遮二初敘廣總示二若下列釋名相二初示三遮定不得二五下明餘遮通得否二初先示諸部雜相三初五分二僧祇二初引示諸遮二準下準明得否三十誦伽論二衣下正據本宗列餘七種三初衣鉢三初引本律二今下決多論二初引論二引下決判三昔下斥妄例二父母三負債四諸奴三初五種奴二今下放奴三五下佛僧奴五官人六丈夫二初約義示相二故下引證堪能七五病二初通示五種二善下別明癩病二次下辨餘事二初標二五下正釋三初暗處可否二若下曾受加問三四下所被多少三上下明正問二初標示二教下正明七初敷座安慰二彼下取本䛬誘三應下勸令實答四汝下問十三難五更下更問十遮六應下囑後同答七應下具儀安立七單白入衆二初標二律下釋二初作白二白下召入八正明乞戒二初標二彼下釋三初置衣安慰二語下勸導用心三大下正陳乞詞九戒師白和二初標二彼下釋二初正明和白二對揀二師二初問和白有無二問差法須否十正明對問二初標二律下釋二初示衣勸實二汝下正問遮難二初問難二汝下問遮二正明體用二初牒章二若下正釋三初受體三初受前開導二初敘由二應下略示二初示境發心二次下開懷納法二應下正加羯磨四初作白二初先告衆二大下正作白二又下第一羯磨三初先告白二大下正羯磨三此下問成否三告下第二羯磨四告下第三羯磨三若下教示雜行二初示知時節二初通明二四下引示二初四分二善見二若下安置處所二初正示二問下釋疑二次下説相二初約緣顯意二應下勤持示相三次下受淨二捨戒六念法附二初六念二初牒章二第下正釋二初正明六念六初念知日月二初列相顯意二若下示律別緣二念知食處二初標舉二若下列釋二初不受請法二若下受請法二初無請法二若下有請法二初通標二應下別釋二初不背法二若下開背法三念知夏臘四念知衣鉢五念同別食六念身康羸二僧下兼示雜相五初畜衆具二五下教誦戒三善下備制物四四下憶受緣五時下示時節二舍戒二初標章二四下正釋二初僧捨二十下尼捨二初引示二釋疑三師資篇第九分二初篇目二本文二初敘來意三初敘相攝之益二比下彰非法之由三故下示立篇之意二就下開章釋二初分章二初下隨釋二初弟子依止二初分章二問下隨釋二初師弟名相二初別釋兩名二初師名二弟下資名二總辨相攝二初標二尸下釋三初六方禮經二僧祇律三四分律二依止法二初標分二初下正釋二初簡應法二初開不依止二初總標二四下列釋二初本宗六種二他部二種二須依止二初總標二四下列示二初前七人二後三人三前下通簡二初分判二然下義評二明正行二初標分二初下隨釋二初七種共行法二初釋本