body:
  text: 五頭陀行儀篇第二十一二初篇目二本文二初敘來意二初正明二智下引證二就下開意釋二初分章二初下隨釋四初釋總名顯德二初正釋名德二初釋名二增下顯德二初顯功德二十下彰勝利二頭下料簡通塞二列數明體二初標舉分科二初下依科別釋二初相生次第四初衣中有二種二雖下食有四種三然下處有五種四上下威儀有一二列名行體二初標章二初下列釋十二初衲衣三初標行體二十下明勝利三寶下顯功能二三衣二初標行體二論下明勝利三乞食六初標聖行二薩下明制意三四下示乞法二初入聚法二僧下語默法三十下至家法四十下彰勝利五善下顯梵名六僧下引誡勸四不作餘食法五一坐食三初標勝利二智下誡節量三三下明制意六一摶食二初標示行體二解下節量對治七蘭若三初定量遠近二若下指略餘二三僧下引誡毀聖八冢間九樹下十露地四初明行體二增下示所修三善下簡深淺四論下彰勝利十一隨坐十二常坐四初明行體二解下示心用三十下引勝利四四下明勸修三諸部異行二初標章二毗下列示六初毗尼母論二智度論三寶雲經四十住婆沙論五解脫道論六十誦律三上下結指四雜出諸法二初標章二四下正釋四初明瞻待二四下明作務三善下明免事四五下明捨法六僧像致敬篇第二十二二初篇目二本文二初敘來意三初明道俗義同二故下引經誠證三比下斥時顯意二就下開章釋二初分章二初下正釋二初僧像本篇二初分章二初下隨釋三初制相敬意二初敬佛意二所下相敬意三初明立敬之意二大下引因果勸修三智下明坐立差異二對敬立緣合不二初標章二四下正釋二初不應禮二初四分部二寶梁經二二下應禮二初標分二初下隨釋二初無緣合敬二四下有緣不禮三立敬儀式二初標分二初下隨釋三初敬佛法二初標章二若下正釋二初先示敬儀六初受用功勝二增下承事感報三智下設禮儀式四智下對境用心五毗下入塔法六五下施繞法二正明敬相二初標二佛下釋二初總斥非法二初通斥輕慢之相二初斥非致毀二故下引教伸誡二比下別斥居床設禮二十下雜列敬相四初供具等法二大下遺身利物三僧下修供時節四四下相敬遠益二敬僧法二初標章二若下正釋二初攝衆開徒立二若下受懺須師禮三大小致禮法二初標章二毗下正釋六初制敬本意二四下五衆相禮二初通明五衆二初次禮人塔二五下禮師尸冢二四下別示沙彌二初明次第二問下釋疑三四下致禮諸相四毗下約夏分位五僧下共坐階降二初明大僧二伽下示餘衆六僧下受禮慰勞二造像法附二造像法附二初牒章二初下正釋二初造像塔法二初造像二初通敘經像意二恐下正明造像二初中國造立元緣二今下此方制度漸失三初前代近真二今下後世失法三初明非法二致下示過患三若下明應法三善下西土靈儀二造塔二初標章二雜下正釋六初示名二增下顯報三四下敬護四僧下造處五善下供養修治五初勸化供養二若下見塔塗法三若下造立莊嚴四不下接續毀損五若下校量福報六無下造毀二報三初掃治善報二初無垢女經二涅槃偈二智下隨時供養三十下毀壞惡報二造寺法二初標章二有下正示二初總示所引二謂下正引法式二初應法生善二但下無法致損四初造立非法二又下騰踐毀壞三若下引勸俗流四因下因誡道衆三初自敬生信二假下舉俗況道三由下結示自失七訃請設則篇第二十三二初篇目二本文二初敘意生起二就下分章解釋二初列章二初下隨釋十初受請法二初牒章二十下正釋九初來請等法二五下俗家敷設三增下許請之相四五下對請可不五四下僧別二請六今下改正筆注七薩下往訃是非八善下下衆同受九僧下自往雜相二往訃法三至請家法二初標章二若下正釋二初安置聖位二初示鋪設二不下斥非法二僧下敷牀列坐四就坐命客二初標章二彼下正釋六初入位隨坐二四下相問大小三僧下慰問施家四四下無緣後往五僧下訶止暄笑六五下外客聽不五觀食淨汙法二初標章二四下正釋二初審問作淨二僧下給付不來六行香呪願法二初標章二四下正釋四初呪願前後二若下讀誦可不三增下行香儀則三初引本緣二若下示離過三行下明作唄四四下呪願隨機二初通示隨機二比下正示法式四初斥非標示二僧下列示諸法三長下引聖況凡四雜下引愚證失七受食方法二初標章二四下正釋三初受食法式二初呪願受食二三下踞坐離過二二下出衆生食二初示前後二涅下明所為三初引諸文示法二今下勸改祭行施三智下明所施非多三僧下行食雜法六初行食法二四下唱等法三五下正受法四四下等施法五僧下受用等法六十下喫食雜法八食竟收斂法二初標章二僧下正釋二初相待二賢下行水九噠嚫布施法二初標章二五下正釋七初示名二四下引緣三薩下後説之意四律下所説之法五五下能説之人六律下釋一偈之義七今下明財施之式十出請家法二初標章二五下正釋二初出請家法二雜下歸本處法八導俗化方篇第三十四二初篇目二本文二初敘來意二初道俗相濟彰益二而下末世無法成濫二今下開章釋二初分章二初下隨釋三初説法軌儀受戒方法二初説法儀式十四初勸護受施二四下諸説是非三三下登座儀式四毗下籌量稱機五涅下攝衆如非六雜下教誡説法七五下受利可不八三下入房請問九毗下能説隨宜五初明撮要二涅下明適時三雜下明訓俗四智下明自行五大下明隨機十毗下為俗門師十一十下存心離過十二薩下教導俗式十三地下隨機慰問十四僧下接奉王臣二受戒方法二初標分二初下隨釋三初翻邪三歸二初標列二初下隨釋四初制意二懺悔法三立歸法四總料簡二五戒二初標列二初下隨釋三初簡人是非二初簡得不二故下教發戒二作法差別二初正納戒體二智下示相教誡三料簡四初成論二多論三智論三初明齋日二問下明口過三又下示因果四增下總指三八戒二初標章二薩下隨釋三初明自他二次下正受法三初作法戒體二懺悔立期三説相發願三僧下列雜法二辨生緣奉敬二初標章二五下隨釋七初恩重難報二僧下節量信毀三涅下以法開悟四雜下供養感報五五下供給老病六僧下呼召異俗七若下沒後扶舁三明士女入寺正式二初標章二先下正釋二初出立意二今下明法式二初中國舊法二初入寺法二初清信士法二初示正法三初禮敬捨惡等法二禮下想念慎護等法三若下有緣暫宿等法二凡下斥非法二初示入寺本意二今下明非法之相二清下清信女法二如下出寺法二此下今師要術三初指前標後二謂下正示敬護初明道俗相資二凡下誡拾僧過失三然下歎愚人難犯三諸下付囑傳告九主客相待篇第二十五二初篇目二本文二初本篇二初敘制意二就下分章釋二初總標二初下別釋四初入寺法二問主人受房等法三相識敬儀四問受利法三初審問對答二僧下語示僧制三三下通明瞻待二法附二初標章二夫下正釋二初敘意二五下列示二初總明四儀二毗下別示雜相二初出行法三初明行法二僧下示行相三智下教攝心二僧下坐臥法二初通明二三下別示二初坐法三初示二坐法二三下辨共坐法三三下明上床法二善下臥法
