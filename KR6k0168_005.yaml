body:
  text: 二說戒篇第十明非情事二初篇目二初標題二注顯三初標示正譯二出下廣引多翻三俱下會通今目二本文二初敘來意二初引勸勉三初顯教功益二然下斥時輕慢三昔下彰今述作二然下引文證二初敘意生起二善下引示諸文二就下開章釋二初標分二初下隨釋二初僧法二初標分二初下隨釋四初時節不同二初通列五種二四下別釋四義四初三日差別二僧下食前食後三四下明增減二初引緣顯相二但下斥古僞傳四四下時非時二雜法衆具二初牒章二五下正釋二初衆具雜相四初作相二十下行籌三初引緣起二五下明製法三四下示梵名三五下散華莊嚴四僧下淨水等物二僧下人法是非三初差誦行籌等法二五下恭敬志誦等法三十下供給知法等法三正說儀軌二初牒章二此下正釋二初總示二一下別釋二初正釋十初處所二衆具三白告四集僧三初作相集僧二沙下聞鍾說偈三次下入堂恭攝五供具六維那行事二初大小同法二初盥浴法二初盥掌浴籌二餘下行衆湯水二初示正儀四初行淨水二依下行淨巾三又下行香湯四此下指說偈二又下斥非法二其下唱白法二初先示打靜法二當下正明唱告法六初審問監護二又下召集聖凡二初正唱召集二有下別斥異儀三初局召聖二有下加未具三不下加不清淨三如下告衆受籌四便下行大僧籌三初受籌二彼下還籌三如下納籌五維下行沙彌籌六維下取數告衆二初上座告數二維那起唱二若下小衆別法七請戒師四初示制緣二應下陳請三彼下唱告四彼下升座八供養說戒四初高座有無二彼下打靜梵唄三彼下灑散華水四彼下行香供養九問答二初問緣三初簡小衆二不下問傳欲三又下請教尼二初召問二彼下請法二初出略法四初出衆白僧二至下依位陳請三若下上座對答四彼下受囑復座二若下指廣法二說下問事宗二初明答法二然下誡衆首十說竟三初說已梵唄二說下下座陳詞三衆下衆僧自慶二就下雜辨二初標二若下釋八初外來告淨二若下主客相從三毗下對犯不說四若下多尼求請五若下恐誤示令六四下誦餘經法二初制法次第二並下舉功深勉七若下犯懺可否八若下座上發露四略說雜法二別人法四略說雜法二初牒章二四下隨釋二初略緣二初引教以明二初本宗二十下他部二初總示略緣二十下別明對說二若下約義以立二第下略法三初通示略義二說下正明略法二初通示緩急兩相二說下別顯急緣儀式三初容預可說法二若下隨說卒難法三若下欲說難近法三上下結斷旨非二別人法二初標章二律下隨釋二初引制二若下示法三初衆法二對首三心念二初明說戒二若下示露罪三初引諸解二律下明今取三五下引文證三安居篇第十一明二合事二初篇目二本文二初敘制意三初敘教本二故下明偏制三然下指所歸二初下開章釋三初安居本篇二初標列二初下隨釋五初安居緣二初標列二初下隨釋三初處有是非四初別示所依二明下總明五法三十下明難處四毗下示白法二結時不同二初牒章二由下隨釋二初約制總明三時二初引文顯制二問結三所以二上下就夏別明三時二初標示二初下隨釋二初正示三時二初結之分齊二前下住之不同二因下泛明前後二初通標二一下列釋三如文三夏閏延促二初牒章二依下隨釋二初約教詳定二初正明二初引示不同二初準多論依閏二若下據伽論不依二既下約緣兩判二問答二初問受日二問迦提二今下依閏差別二初總標二若下別列三初閏五月六月為一位二若下閏四月分三位三三下閏七月分二位二分房法二初牒章二四下隨釋三初明分法二初制緣二白下行法三初作法差人二彼下白僧集物三彼下次第分法二問答二初約行食立難二約分物重徵三僧下辨餘相二初僧祇二四分三作法不同二初標列二初下隨釋二初設教對緣二初通標二初下列示四初對首三初前安居二初加法三初標示二當下出法三若下明改轉二問答二初問修治之意二問所依之人二初問答簡辨二所下推究所由二中安居三後安居二心念三忘成四及界二用法分齊四遇緣成否二初標分二初下隨釋二初有難移夏二初正明移夏二初引律開文二準下詳定成否二初約勤怠以判二五下準文義以證二初引通文二摩下示明決二問下雜辨諸緣五初忘不受日二問下出界遇難三問下明相會夏四若下藍界寬狹五四下遇緣自去二受日逢難二初標示二四下隨釋二初引開文二準下約義決五迦提解界二初總標二初下別釋二初迦提五利二解界是非二初標示二人下隨釋二初引古難破二若下伸今正解二受日法附三料簡雜相二受日法附二初牒章二夏下隨釋二初敘開意二就下分章釋二初標分二初下引釋三初通料簡二初標示二一下列釋四初對人二對界三先後二初立今斥古二釋通疑妨四相攝二初攝前二若下攝後二緣是非二初牒章總標二初下隨位別釋八初定緣是非二初標二凡下釋二初通明是非二初為他緣二若下私己緣二就下別辨緣相三初總標二一下列釋五初三寶境界緣二道俗緣三父母大臣緣四衣鉢草藥緣五和僧護法緣三上下結斥二對事離合三懸受四互用二初正明三初約別受明通塞二若下就通受明通塞三乃下約一家明通塞二釋妨三初問別寺二問僧次三問捨請五重受二初昔解二今解二初立義二五下引證二初引誠教證四初五分律二十誦律三五百問論四明了論二余下述傳聞證六約事長短七僧尼不同三初引示開制二比下斥世濫用三所下顯不同所以八事訖不來成否三依位解二初牒名二前下正釋三初心念三初明緣法二此下告下衆三其下指沙彌二對首二初受法二然下簡辨三初示二法二若下明過用二初正明二若下躡難三問下問兼夜三衆法二初示緣二今下立法二初通標二二下別顯三初略指二家二第下評第三師二初約義顯非二問夏得否三第下取第四師二初半月法二其下一月法三料簡雜相二初牒章二若下正釋二初多人受日可否二若下依處安居差別二初列示二初依界二若下依藍二初無界依藍二若下有界不依二上下結指四自恣篇第十二明非情事二初篇目二本文二初自恣本篇二初敘制意二初正明二初制自恣意二初示意二故下引證二所下制夏末意二初約義求二故下引文證二此下遮濫二就下開章釋二初標列二初下隨釋三初緣集相應二初標分二前下隨釋二初時節差別二初列示三位三初含閏前後二諍事增減三修道延日二然下詳定三日二應人是非二自恣方法二初標列二就下隨釋三初五人已上僧法二初六人僧法二初標列二初下隨釋四初僧集緣起三初鳴鐘敷設二初下籌水唱告三乃下小衆同別二五德自恣二初標分二初下隨釋四初簡人是非三初列二種德相二所下差二所以三今下斥世非謬二差法正式二初簡德定處二作下索欲問和三應下正加差法三五德行事二初和僧二初出衆白和二若下答法通別二次下行草二初授草二五下唱告四對座說儀二初略示聖儀二次下正明行法二初明自恣四初五德來儀二四下衆僧自恣二初明制法二初別示二座二初上座二初修敬二應下陳詞二其下次座二如下總結餘衆二律下示開法三若下五德處所四若下說訖告衆二若下明舉罪三初舉法不同二五下反治須否三若下僧數具缺三尼來請說二初標二若下釋三初無尼來請二若下有尼來請二初白日同席法二初尼來陳請二上下上座告敕二今下隔日重集法二初正明二問答三五下尼來得否四略說雜行二初牒章二言下正釋二初雜緣略法二初指略難緣二若下正明略法三初對五德略二初示略儀二今下斥非法二四下僧自相對略二初示略法二以下明作白三四下卒難直去略二難事小界二上下五人僧法二初結顯生後二若下正明作法二二下四人已下對首法三初正自恣二若下明犯懺二初可懺二若下不可懺二初列示罪相二若下準用發露三此下示妄陳三若下一人心念法二初自恣二若下懺罪三雜明諸行二迦絺那衣法附三雜明諸行二初牒章二問下正釋十初僧別辭句二說恣單重三未具前說四律下客來多少五十五出界二初明出界二受下辨受日六餘處自恣七前後受施八無緣略說二初無緣可否二四下教詔年少九前後相從十夏竟離處二迦絺那衣法附二初牒名二就下正釋二初分章二初下列釋五初受衣時節二初受捨時限二初約本宗以明二故下引他部為證三初十誦二五分三母論二十下不開攝閏二衣體是非七初四分二十誦三伽論四僧祇五五分六善見七四分三簡人差別二初標分二四下正釋二初受衣人三初四分二善見三十誦二持衣人三初十誦二善見三了疏四受衣方法二初標分二四下隨釋二初作次法三初差人二善下明共作三諸下示略意二受衣法二初置衣法式二秉法行事二初先秉法三初簡衆和僧法二注如下差持衣人法三注彼下持衣與法二彼下正受衣五初申敬取衣二上下次第授與三彼下對陳詞句四即下收褶次行五如下行訖告衆五捨衣雜相二初標示二四下正明二初捨法不同二初本部二初通列多種二今下別顯和合二僧下他部二五利通塞二初標二律下釋二初明通塞二思下誡等心
