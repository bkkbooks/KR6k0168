body:
  text: 三結界篇第六明秉法處分二初篇目二本文二初敘總意四初究結界之本二由下明同法之意三但下示發起之緣四大下彰立教之益二就下開章釋二初標列二初下隨釋四初列數定量二初標簡分章二一下隨章正釋二初自然界二作法界二初敘意標分二初下依章正釋三初大界二初標示名體二明下定量寬狹二初僧界二初廣引諸文二初里數未顯二故下由旬不同二通下準律定判二薩下尼界二戒場三小界三初敘緣定量二一下列示名體三此下釋通無外二依位作法二初標分二若下隨釋二初結法二初廣明三種結法三初結無場大界二初標示分章二初下隨位別釋二初先出緣成二初分章二初下隨釋三初料簡是非二初標章二問下正釋六初問合村二問合河三問標相四問內外五問三相六問重結二竪標唱相二初牒章二初下正釋二初竪標二初明標相二初立相是非二初引本宗二善下引他部二既下囑今榜示二次下示界形二唱相二初標二今下釋二初明離過二初敘由標示二謂下列釋過相二初城邑二初外唱過二若下內唱過二蘭若二初約相顯過二故下引教斥非二次下示唱法二初標二律下釋三初明唱人二先下定初始三若下正唱相二初空野處二若下城邑中二初示相二若下辨異三集僧欲法二初標章二初下正釋二初明兩種集僧二初明盡集二若下示別界三初村界二若下尼界三若下僧界二辨不開受欲二正加聖法二初標章二上下正釋二初問答事宗二文下作法加結二初作白二羯磨二結有場大界三結三小界二略示餘三大界二解法三法起有無四非法失相二結有場大界二初牒章二先下正釋二初竪標二初示三標二但下立圖相四初敘意二示圖二初圖相二法顯三初示自然二其下明遠近三且下指餘界三此下釋相三初自然相二其下戒場相三其下大界相四上下結指二今下結法二初總標二初下別釋三初緣前後二初正明先後三初引明據二今下斥非法三問下決成否二今下總示非法二二下結戒場三初先唱相二羯下正羯磨二初作白二羯磨三結下結已法三次下結大界二初標示二先下正明二初唱相二初通示總別二又下正明總法二衆下羯磨二初明牒緣二結下囑榜示三結三小界二初標分二初下隨釋三初集僧遠近二不竪方相三初立正義二比下斥古非二初標古義二此下申今破三初敘緣示妨二故下準文顯同三若下遮彼濫引三若下顯行事二初明受戒二若下明說恣三指略結法二餘下略示餘三大界二解法二初標章二先下別示三初解無場大界二解有場大界二初示先後二上下明解法二初解大界二次下解戒場二初示解處二律下明解法三初廢古法二文下出羯磨三善下示雜相三解三小界三法起有無二初牒章二有下正釋二初取有法解二初立理二善下引證二昔下貶無法解四非法失相二初標示二初下正釋二初結處非法二言下失否之相二初通標二一下別釋二初明失二初棄捨失二初正明二問下釋難二若下作法失二不失二初標舉二一下正明二初通列五種二五下別證第二四僧網下六篇明所被事分四初前三篇明情事三初僧網大綱篇第七二初篇目二本文二初敘篇意三初敘如法之益二若下彰任情之損三今下示立篇之意二就下開章釋二初分章二初下開章釋五初約化制二教明相不同二初標分二且下隨釋二初化教二初標章二大下正明三初大集經二十輪經四初攝鈍根法二若下治破戒法三若下不許俗治四優下不對俗治三涅槃經二制教二初牒章二僧下隨釋二初敘來意三初敘根立法二比下斥濫勸行三四下示知可否二今下示治法二初正明七九法二初總列二一下別解二初正列七種二初正明三初明四羯磨四初訶責二初標分二言下隨釋二初出過三初總舉二若下別明四初四分三初出過示相二初總列四事二言下別釋邪命二雖下舉法如非三然下示合治之相二五分三僧祗四了論三上下簡濫二正治二初標列二初下隨釋四初立治二初牒名二此下正示三初明具緣二律下正加法三若下示不成二奪行二初牒名二與下正示二初陳告二何下列相二初總舉二初下別釋七初五奪眷屬二五奪智能三五奪順從四五奪相續五五奪供給六五奪恭敬七五奪證正他事三順從二初牒名二應下正示四解法二初牒名二律下正釋三初陳乞詞二上下加羯磨三其下示雜相二初威儀坐處二若下所被多少二擯出三初出過相二若下示治法三若下明求解三依止二初出過相二治下加治法四遮不至白衣家二初出過加治二若下差人遣謝二更下總簡同異二初標示二前下正明二初明前四二後下示後三二初敘過彰異二今下斥濫勸罰三次下明三舉三初不見舉二初出過明治二四下總示行處二不懺舉二初出過明治二僧下總示求解三惡見不捨舉二此下結益二初正結二故下引證二初引制教彰益二涅下引化教勸治二初引示二初涅槃勸道俗治二大集勸俗王治二問下會通二初問二答二言下後加二種二初惡馬治法二默擯法二言下因示滅擯法四初出過明舉二五下正加擯法三薩下對異標簡四即下斥世不行二約僧制衆食以論通塞三約法就時對人以明四約處就用以明五衆主教授之相二受戒緣集篇第八三師資相攝篇第九二說戒篇明非情事三安居篇明二合事四自恣篇明非情事二約僧制衆食以論通塞二初牒章二先下隨釋二初僧制是非四初分章二初下引釋二初明世立非法三初總列諸過二良下推釋所以二初正示非法二僧下引證如法三問下決通犯相二次下引正制證成二初通標二四下列示四初隨順如法二明下列示諸制三十下除滅非法四四下告語衆