body:
  text: 十瞻病送終篇第二十六二初篇目二本文二初總分二初下別釋二初瞻病二初分章二制下隨釋四初制意三初敘意二故下引證三問下釋疑二簡人并供養法二初簡人二初標二四下釋三初簡人不同二僧下道逢迎逆三並下結告指廣二供給二初標二五下釋六初聽僧造食二僧下瞻視諸法三十下求索給付四善下求貿可否五摩下雜物開濟六四下安置便器三安置處所二初標二僧下釋二初約教就房舍二若下依傳立別堂四說法歛念二初標二十下釋二初餘人勸導法三初通標二若下別列六初蘭若人二誦經人三持律人四法師五禪師六佐助眾事人三傳下總示二初明唱讀二必下明易處二其下瞻病勸導四初明說法二四下問衣鉢三應下示經像四又下教勸導二送終二初牒章二然下正釋二初敘意分章二初下隨章別釋二初將屍出法四初安設儀式二五下啼泣可不三彼下客來吊慰四五下覆屍殯送二明葬法五初明四法二增下香華供養三四下起塔立像四增下自轝報恩五善下送俗進否十二諸雜要行篇第二十七二初篇目二本文二初敘意三初立篇意二若下對簡前後三其下勸覽彰益二十下開章釋二初標列二智下隨釋十初明佛法僧七初禮敬二薩下供養三十下知事四薩下毀像五智下供法六十下差立主掌七僧下守護三寶三初守護二僧下收舉三毗下用與二眾中雜事二初標二入下釋三初入眾堂二善下登高座三打下打靜法三別人自行二初標二十下釋十六初不應答法二四下勸學戒律三五下雜學可不四五下剃除髮爪五四下近俗過失六成下捨離五慳七四下欣樂五寶八十下坐禪過相九四下卜術呪誓十增下有緣念聖十一五下入尼寺法十二四下嚼楊枝等法十三僧下然燈法十四五下施食法十五僧下然火過失十六撰下掃地得益四共行同法二初標章二所下正釋三初誦習三藏三初敘根器差別二既下教其誦習三三下引文勸勉二善下制學毗尼三多下有緣顯德五出家要業二初標章二道下正釋二初略明通局二出下委示別修二初正示三初明相須不雜二俗下示雜法兩殊三雖下指示通局二上下引證二初標指二智下正引六遇賊法二初標章二四下正釋二初遭賊法二毗下遮賊法七大小便法初標章二四下正釋初正明登周法二五下列示諸雜法八慈濟畜生法二初標章二四下正釋二初慈心解放二十下獵師求索九避惡眾生法二初標章二五下正釋二初避非人法二四下驅諸畜法十雜治病法二初標章二善下正釋二初先明醫師二四下正明治病十二沙彌別行篇第二十八二初篇目二本文二初敘來意二初敘本示濫二然下明信智二門二故下開章釋二初分門二初下隨釋二初明出家本意二初標列二初下隨釋七初出家元緣二勸出有益二初標章二華下正釋二初能勸人益二智下出家人益三障出有損四行凡罪行二初標示二大下正釋二初引教顯相二若下總列五種五行凡福行二初標章二謂下隨釋二初竪明二智下引證六行聖道行二初標二但下釋三初述意總標二一下列示三位三離下結略指廣七大小乘相決同異二初標章二三下正釋三初總示二若下別釋二初小乘三學二初戒二定慧二大乘三學二初戒初標示同異二智下廣示異相三初智論二初正引論文二問答釋疑二初會斷常二見二決貪瞋二心二攝論三涅槃經二定慧三且下結勸二初結指二又下重示二依位隨解二就下依位隨解二初牒章標列二初下隨章別明五初出家具緣四初簡人得不三初簡老少二智下簡根具三善下簡聽不二僧下先說苦事三四下受畜沙彌四五下出俗捨離二作法不同二初標章二欲下正釋三初秉白告眾二作下陳詞請師三應下剃髮儀式二初標示二在下正釋十二初莊嚴設座二欲下辭親易服三來下師為說法四為下灌頂贊歎五教下禮佛歸依六阿下闍梨剃髮七與下師除頂髮八除下授衣披著九禮下施繞自慶十禮下辭親受賀十一中下剃髮時節十二毗下即受歸戒三受戒方式二初標分二初下正釋三初緣五初作白告眾二五下能受是非三五下受法次第四善下示威儀五律下教問緣二體三相四初列戒相五初正教說相二授下說功德三戒下隨難解四四下明餘戒五又下指四依二次下說五德三次下說六念四僧下說十數二初標舉二準下列釋二初正明十如文二此下結歎四隨戒雜相二初標章二沙下正釋二初通簡同別二初示同別二所下辨所對二次下別示秉法二初總標二先下別釋二初別法四初別明衣法二受下指同餘法三若下諸懺罪法四餘下安居受日法二眾法二初標示二若下正釋二初明通別眾法二初說戒二初通行法二若下別行法二若下自恣二若下對首心念法五雜行教示二初標章二其下正釋三初略指二毗下廣引三初身口雜行二薩下罪相開遮三五下責罰同利三有下斥謬十三尼眾別行篇第二十九二初篇目二本文二初敘來意二初指前生起二所下推釋次第二就下開章釋二初分章二前下隨釋三初明大尼二初標分二初下隨釋七初受戒法二初畜眾二次下受戒二初標示二受下正釋二初明受本法二二下正受戒體二初總標二初下列釋五初徃來是非二初標二四下釋三初明是二有下斥非三釋疑二初問僧寺作本法二問本法人名字二僧尼數量二初標二有下釋二初引諸文斥非法二五下引五分示正儀三尼須結界二初標二有下釋三初立理斥非二應下結時儀式三又下結勸依行四安置儀式五入戒法中二懺罪法二初標章二初下正釋三初懺初篇二二下懺二篇三偷下懺諸篇三說戒法二初標章二善下正釋四初引本緣二二下正行法六初往請法二準下受囑法三僧下尼入寺法四彼下僧為請法五至下僧誡勅法六至下尼傳教法二初正明二問答三四下明雜相四比下指廣略四安居受日二初標指二尼下明依僧三初明制犯二僧下教受請三善下示遠近五自恣法二初標章二四下正釋三初明行事二律下示雜相三問制意六隨戒相二初標章二尼下正釋二初委釋盛行三初八重二初指同二摩下明異三初摩觸二初標列犯緣二尼下辨析犯相二初成犯二四下不犯二八事二初列犯緣二八下釋犯相二初明犯二初正釋八事二準下料簡異相二明不犯三覆藏二初列犯緣二若下釋犯相二初成犯三初釋覆藏心二若下釋發露三四下釋結犯二不犯二僧殘二初標指同戒二言下隨釋異戒二初言人戒二初列犯緣二四下明犯相二初正示相言二五下別列餘相二四獨戒二初總標二獨下別釋二初明犯相四初獨渡河二獨入村二初列釋四緣二昔下斥古明犯三獨止宿四獨後行二明不犯三單墮二餘下指略稀用七師徒雜行二初標章二尼下正釋二初師徒相攝二次下八敬要行三初敘緣勸勉二今下列名示相二初正列敬法二五下示違敬法三僧下明諸雜行二初開語僧二四下白入寺二明式叉二初標名二四下正示三初明本制二應下正加受三此下示學法三初列示三種二若下總明犯相三律下廣釋行法三初授食開閉二僧下眾別行法三四下制立兩緣三明沙彌尼十四諸部別行篇第三十二初篇目二本文二初敘篇意五初博學兼濟二若下本闕他求三然下約受科判四若下正顯立篇五然下示廣指要二就下分章釋二初標列二初下隨釋七初僧數多少四初受懺多少二十下受緣通塞二初引對本律二十下別示外宗三十下與欲足數四善下帶難出家二聖法通塞二初標章二四下正釋二初羯磨二初本宗揩定二僧下他部增減二四下所被三僧下與欲三重犯不同二初標章二四下正釋二初本宗有重犯二十下他部無重犯四攝事寬狹二初標章二且下正釋二初受日二初標示二四下隨釋二初本宗二他部二初僧祇二十誦二十下淨地五心境差別三初標章二四下正釋二初本宗二五下他部三初五分約無疑心二僧祇約罪遮性三十誦約前方便三且下結略六捨懺有異二初標章二十下正釋六初十誦二五分三僧祗四善見五了論六多論七隨相階別二初標章二十下正釋第三批文
